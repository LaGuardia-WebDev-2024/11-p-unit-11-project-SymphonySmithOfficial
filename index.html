<!DOCTYPE html>
<html>
<head>
  <title>Anime Reveal</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    /* Five CSS Declarations */
    body {
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .anime-img {
      width: 300px;
      border-radius: 10px;
      display: none; /* Hidden until button is clicked */
      margin-top: 20px;
    }

    #buttons {
      margin-top: 30px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

  <h1 class="title">Click a Button to Reveal an Anime</h1>

  <!-- Buttons -->
  <div id="buttons">
    <button id="btn-naruto">Show Naruto</button>
    <button id="btn-demon">Show Demon Slayer</button>
    <button id="btn-onepiece">Show One Piece</button>
  </div>

  <!-- Three Images -->
  <img id="naruto" class="anime-img" src="https://4kwallpapers.com/images/wallpapers/naruto-team-7-1080x1920-19989.jpg">
  <img id="demon" class="anime-img" src="https://tse3.mm.bing.net/th/id/OIP.Lhxf8eHBgpKcgusxjQ_2NAHaJI?rs=1&pid=ImgDetMain&o=7&rm=3">
  <img id="onepiece" class="anime-img" src="https://tse2.mm.bing.net/th/id/OIP.DD9npZzBS8_WPWA3HZ4bvQHaDt?rs=1&pid=ImgDetMain&o=7&rm=3">

  <script>
    // jQuery Selectors:
    // Element selector: $("img")
    // ID selector: $("#btn-naruto")
    // Class selector: $(".anime-img")

    // jQuery Methods Used:
    // .hide(), .show(), .css(), .text(), .fadeIn()

    // Hide all images at start
    $(".anime-img").hide();

    // Naruto Button
    $("#btn-naruto").click(function() {
      $(".anime-img").hide();        // hide all
      $("#naruto").fadeIn();         // show Naruto
      $(".title").text("Naruto Revealed!"); // change text
    });

    // Demon Slayer Button
    $("#btn-demon").click(function() {
      $(".anime-img").hide();
      $("#demon").show();            // show Demon Slayer
      $(".title").css("color", "red"); // change CSS
      $(".title").text("Demon Slayer Revealed!");
    });

    // One Piece Button
    $("#btn-onepiece").click(function() {
      $(".anime-img").hide();
      $("#onepiece").show();         // show One Piece
      $(".title").css("color", "blue");
      $(".title").text("One Piece Revealed!");
    });
  </script>

</body>
</html>
